name: Release NetShelfy+ APK

# Trigger: push tag dengan format v1.0.0 atau v1.0.0+2
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Python
        run: python3 --version

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      # Update versionName + versionCode di pubspec.yaml dari tag
      # Tag format: v1.2.0 → version: 1.2.0+{github_run_number}
      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"            # misal v1.2.0
          VERSION="${TAG#v}"                  # misal 1.2.0
          BUILD="${GITHUB_RUN_NUMBER}"        # auto increment
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD=$BUILD"     >> $GITHUB_ENV
          # Update pubspec.yaml
          sed -i "s/^version:.*/version: $VERSION+$BUILD/" pubspec.yaml
          echo "pubspec version updated: $VERSION+$BUILD"
          cat pubspec.yaml | grep "^version:"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (non-fatal)
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK Release
        run: flutter build apk --release

      # Buat GitHub Release dan upload APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "NetShelfy+ ${{ env.VERSION }}"
          body: |
            ## NetShelfy+ ${{ env.VERSION }} (build ${{ env.BUILD }})

            ### Cara Install
            1. Download `app-release.apk` di bawah
            2. Aktifkan *Install from unknown sources* di HP Android
            3. Install APK — atau buka app yang sudah terinstall, notif update otomatis akan muncul

            ---

            ### Changelog

            **♻️ Rename & Rebranding**
            - Nama project: `UploadServer` → `NetShelfy+`
            - Package ID: `com.uploadserver.app` → `com.twos.netshelfy.verseapp`
            - `pubspec.yaml` name: `uploadserver` → `netshelfy`
            - Label app di AndroidManifest: `NetShelfy+`
            - CI artifact name: `uploadserver-release` → `netshelfy-release`

            **🚀 New**
            - `lib/services/foreground_service.dart` — server kini berjalan sebagai Android Foreground Service
              sehingga tetap aktif saat app diminimize atau layar mati
            - Tambah permission foreground service di `AndroidManifest.xml`:
              `FOREGROUND_SERVICE`, `FOREGROUND_SERVICE_DATA_SYNC`, `POST_NOTIFICATIONS`, `WAKE_LOCK`
            - `ic_launcher_foreground.png` ditambahkan di semua densitas mipmap
              (hdpi / mdpi / xhdpi / xxhdpi / xxxhdpi)
            - Folder `docs/` ditambahkan sebagai tempat dokumentasi proyek

            **🔧 Updated**
            - `pubspec.yaml`: tambah dependensi `flutter_foreground_task ^8.0.1`
            - `update_service.dart`: `MethodChannel` dan cache path diperbarui ke package ID baru
            - `server_service.dart`: `MethodChannel` diperbarui ke package ID baru
            - `LICENSE`: `flutter_foreground_task` diakui sebagai third-party component

            **🧱 Stack**
            - Flutter (Dart) — UI Material Design 3
            - Kotlin — native Android bridge via `MethodChannel`
            - Python 3.11 (Chaquopy) — HTTP server via `server_bridge.py`, di-bundle ke dalam APK
            - `flutter_foreground_task` — persistent background execution

            **⚙️ CI/CD**
            - `build.yml` — Build APK otomatis pada setiap push/pull request ke `main`
            - `release.yml` — Build & publish GitHub Release otomatis saat push tag `v*`

            **📄 License**
            - MIT License © 2026 EmuVlucht
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
